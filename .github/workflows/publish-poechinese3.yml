name: Publish PoeChinese3 (macOS ARM64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'Examples/PoeChinese3/PoeChinese3.csproj'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r osx-arm64 \
            --self-contained \
            -p:PublishAOT=true \
            -o publish/PoeChinese3-osx-arm64

      - name: Remove debug symbols
        run: rm -rf publish/PoeChinese3-osx-arm64/*.dSYM

      - name: Set executable permission and create archive
        run: |
          chmod +x publish/PoeChinese3-osx-arm64/PoeChinese3
          tar -czvf PoeChinese3-osx-arm64.tar.gz -C publish PoeChinese3-osx-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PoeChinese3-osx-arm64
          path: PoeChinese3-osx-arm64.tar.gz
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: PoeChinese3-osx-arm64

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: PoeChinese3-osx-arm64.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
