name: Publish PoeChinese3 (macOS ARM64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'Examples/PoeChinese3/PoeChinese3.csproj'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout OodleUE (sparse - only macOS lib)
        run: |
          git submodule init External/OodleUE
          cd External/OodleUE
          git sparse-checkout init --cone
          git sparse-checkout set Engine/Source/Runtime/OodleDataCompression/Sdks/2.9.14/lib/Mac
          git checkout

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r osx-arm64 \
            --self-contained \
            -p:PublishAOT=true \
            -o publish/bin

      - name: Remove debug symbols
        run: rm -rf publish/bin/*.dSYM

      - name: Create .app bundle
        run: |
          APP_NAME="PoeChinese3"
          APP_BUNDLE="publish/${APP_NAME}.app"
          
          # Create directory structure
          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources"
          
          # Move executable to Resources
          mv publish/bin/PoeChinese3 "${APP_BUNDLE}/Contents/Resources/"
          chmod +x "${APP_BUNDLE}/Contents/Resources/PoeChinese3"
          
          # Create launcher script that opens Terminal
          cat > "${APP_BUNDLE}/Contents/MacOS/PoeChinese3" << 'LAUNCHER'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          RESOURCES_DIR="$(dirname "$SCRIPT_DIR")/Resources"
          EXECUTABLE="${RESOURCES_DIR}/PoeChinese3"
          
          osascript <<APPLESCRIPT
          tell application "Terminal"
            activate
            do script "cd ~ && '${EXECUTABLE}'; echo ''; echo '按 Enter 關閉視窗...'; read; exit"
          end tell
          APPLESCRIPT
          LAUNCHER
          chmod +x "${APP_BUNDLE}/Contents/MacOS/PoeChinese3"
          
          # Create Info.plist
          cat > "${APP_BUNDLE}/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>PoeChinese3</string>
            <key>CFBundleIdentifier</key>
            <string>com.chenyuanyou.poechinese3</string>
            <key>CFBundleName</key>
            <string>PoeChinese3</string>
            <key>CFBundleDisplayName</key>
            <string>PoE Chinese 3</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.utilities</string>
            <key>NSAppleEventsUsageDescription</key>
            <string>PoeChinese3 needs to open Terminal to run.</string>
          </dict>
          </plist>
          PLIST

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Code sign .app bundle
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Sign the actual executable first
          codesign --force --options runtime --sign "Developer ID Application: CHEN YUANYOU ($APPLE_TEAM_ID)" \
            publish/PoeChinese3.app/Contents/Resources/PoeChinese3
          
          # Sign the entire .app bundle
          codesign --force --options runtime --deep --sign "Developer ID Application: CHEN YUANYOU ($APPLE_TEAM_ID)" \
            publish/PoeChinese3.app

      - name: Notarize .app bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create ZIP for notarization
          ditto -c -k --keepParent publish/PoeChinese3.app PoeChinese3-notarize.zip
          
          # Submit for notarization and wait
          xcrun notarytool submit PoeChinese3-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          
          # Staple the notarization ticket to the app
          xcrun stapler staple publish/PoeChinese3.app

      - name: Create archive
        run: |
          cd publish
          zip -r ../PoeChinese3-osx-arm64.zip PoeChinese3.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PoeChinese3-osx-arm64
          path: PoeChinese3-osx-arm64.zip
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: PoeChinese3-osx-arm64

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: PoeChinese3-osx-arm64.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
